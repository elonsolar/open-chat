<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007aff" />
      <stop offset="100%" style="stop-color:#0056d6" />
    </linearGradient>
    <linearGradient id="free-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fff" />
      <stop offset="100%" style="stop-color:#c8e6ff" />
    </linearGradient>
  </defs>

  <rect width="128" height="128" rx="28" fill="url(#bg-grad)"/>

  <g transform="translate(64, 50)">
    <text x="0" y="0"
          font-family="Arial Black, Impact, sans-serif"
          font-size="42"
          font-weight="900"
          fill="url(#free-grad)"
          text-anchor="middle"
          letter-spacing="-1">FREE</text>
  </g>

  <rect x="24" y="66" width="80" height="1.5" rx="1" fill="rgba(255,255,255,0.3)"/>

  <g transform="translate(64, 90)">
    <text x="0" y="0"
          font-family="Arial Black, Impact, sans-serif"
          font-size="30"
          font-weight="900"
          fill="rgba(255,255,255,0.85)"
          text-anchor="middle"
          letter-spacing="8">AI</text>
  </g>

  <circle cx="22" cy="22" r="3" fill="white" opacity="0.25"/>
  <circle cx="106" cy="22" r="2" fill="white" opacity="0.15"/>
  <circle cx="22" cy="106" r="2" fill="white" opacity="0.15"/>
  <circle cx="106" cy="106" r="3" fill="white" opacity="0.25"/>
</svg>
