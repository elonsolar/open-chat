<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI对话</title>
  <link rel="stylesheet" href="../styles/chat.css">
</head>
<body>
  <div class="chat-layout">
    <!-- 主聊天区域 -->
    <div class="chat-container">
      <!-- 顶部信息栏 -->
      <div class="chat-header">
        <div class="chat-header-top">
          <h1 id="chatTitle" class="editable-title" title="点击编辑会话名称">会话</h1>
          <span class="mode-badge" id="modeBadge" title="点击切换发送模式"></span>
        </div>
        <div class="chat-info">
          <div class="roles-tags-wrapper">
            <div class="roles-tags" id="rolesTags"></div>
            <button class="role-add-btn" id="roleAddBtn" title="添加角色">+</button>
          </div>
        </div>
      </div>

      <!-- 消息列表 -->
      <div class="messages-container" id="messagesContainer"></div>

      <!-- 输入区域 -->
      <div class="input-container">
        <textarea id="messageInput" placeholder="输入消息，按 Enter 发送..." rows="3"></textarea>
        <div class="input-actions">
          <div class="send-btn-wrap">
            <button class="btn btn-primary" id="sendBtn">发送</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 右侧平台面板 -->
    <div class="platform-panel" id="platformPanel">
      <div class="platform-resizer" id="platformResizer" title="拖拽调整宽度"></div>
      <button class="platform-toggle" id="platformToggle" title="切换平台面板">🤖 AI面板</button>
      <div class="platform-windows" id="platformWindows">
        <div class="platform-empty">平台窗口将在此显示</div>
      </div>
    </div>
  </div>

  <script src="../config/providers.config.js"></script>
  <script src="../utils/storage.js"></script>
  <script src="../libs/marked.min.js"></script>
  <script src="../chat/chat.js"></script>
</body>
</html>
