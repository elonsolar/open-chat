<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Free AI</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 400px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
    }

    .header h1 {
      font-size: 18px;
      color: #333;
    }

    .quick-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .btn-primary {
      background-color: #4CAF50;
      color: white;
    }

    .btn-primary:hover {
      background-color: #45a049;
    }

    .btn-secondary {
      background-color: #2196F3;
      color: white;
    }

    .btn-secondary:hover {
      background-color: #0b7dda;
    }

    .status {
      margin-top: 20px;
      padding: 12px;
      background-color: #f5f5f5;
      border-radius: 8px;
      font-size: 12px;
      color: #666;
      text-align: center;
    }

    .status.connected {
      background-color: #e8f5e9;
      color: #2e7d32;
    }

    .status.disconnected {
      background-color: #ffebee;
      color: #c62828;
    }

    .tips-box {
      margin: 16px 0;
      padding: 12px;
      background-color: #e3f2fd;
      border-left: 4px solid #2196F3;
      border-radius: 6px;
    }

    .tips-box h3 {
      margin: 0 0 8px 0;
      color: #1976d2;
    }

    .tips-box ol {
      margin: 0;
      padding-left: 20px;
    }

    .tips-box li {
      margin-bottom: 4px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Free AI</h1>
    <p style="font-size: 12px; color: #666; margin-top: 8px;">通过操作AI网页版实现免费对话</p>
  </div>

  <div class="quick-actions">
    <button class="btn btn-primary" id="openSidePanelBtn">📱 打开侧边栏</button>
    <button class="btn btn-secondary" id="newChatBtn">💬 快速新建对话</button>
  </div>

  <div class="tips-box">
    <h3 style="font-size: 14px; margin-bottom: 8px;">⚡ 快速开始</h3>
    <ol style="font-size: 12px; color: #666; padding-left: 20px; margin: 0;">
      <li>先登录AI网站（如DeepSeek）</li>
      <li>在侧边栏创建角色并测试</li>
      <li>创建会话并选择角色</li>
      <li>开始对话</li>
    </ol>
  </div>

  <div class="status" id="status">检查中...</div>

  <script src="popup.js"></script>
</body>
</html>
