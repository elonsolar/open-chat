<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Free AI</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 400px;
      min-height: 500px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans SC', sans-serif;
      background: linear-gradient(135deg, #f5f5f7 0%, #e8e8ed 100%);
      color: #1d1d1f;
      overflow-x: hidden;
    }

    .container {
      padding: 0;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .header {
      background: linear-gradient(180deg, #fff 0%, #fafafa 100%);
      padding: 24px 20px 20px;
      border-bottom: 1px solid #e8e8ed;
      position: relative;
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .logo-section {
      position: relative;
      z-index: 1;
      text-align: center;
      margin-bottom: 16px;
    }

    .logo-icon {
      width: 56px;
      height: 56px;
      margin: 0 auto 12px;
      background: linear-gradient(135deg, #007aff 0%, #0056d6 100%);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      box-shadow: 0 4px 16px rgba(0,122,255,0.3);
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
    }

    .header h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1d1d1f;
      margin-bottom: 6px;
      letter-spacing: -0.3px;
    }

    .tagline {
      font-size: 13px;
      color: #86868b;
      font-weight: 500;
    }

    .platform-badges {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
      position: relative;
      z-index: 1;
    }

    .platform-badge {
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      color: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    .badge-deepseek { background: linear-gradient(135deg, #4f46e5, #4338ca); }
    .badge-doubao { background: linear-gradient(135deg, #0891b2, #0e7490); }
    .badge-qianwen { background: linear-gradient(135deg, #7c3aed, #6d28d9); }
    .badge-kimi { background: linear-gradient(135deg, #6366f1, #4f46e5); }

    .content {
      padding: 20px;
    }

    .settings-section {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      border: 1px solid #e8e8ed;
    }

    .settings-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      cursor: pointer;
      user-select: none;
    }

    .settings-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 700;
      color: #1d1d1f;
    }

    .settings-toggle {
      font-size: 12px;
      color: #007aff;
      transition: transform 0.3s ease;
    }

    .settings-toggle.expanded {
      transform: rotate(180deg);
    }

    .settings-content {
      display: none;
      flex-direction: column;
      gap: 12px;
    }

    .settings-content.show {
      display: flex;
    }

    .setting-item {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .setting-label {
      font-size: 12px;
      font-weight: 600;
      color: #6b6b6b;
    }

    .setting-input {
      padding: 10px 12px;
      border: 1px solid #e8e8ed;
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      transition: all 0.2s ease;
    }

    .setting-input:focus {
      outline: none;
      border-color: #007aff;
      box-shadow: 0 0 0 3px rgba(0,122,255,0.1);
    }

    .setting-checkbox-wrapper {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .setting-checkbox {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .save-btn {
      padding: 10px 16px;
      background: linear-gradient(135deg, #007aff 0%, #0056d6 100%);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .save-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(0,122,255,0.3);
    }

    .save-btn:active {
      transform: translateY(0);
    }

    .ws-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      padding: 6px 10px;
      border-radius: 6px;
      margin-top: 8px;
    }

    .ws-status.connected {
      background: #e8f5e9;
      color: #2e7d32;
    }

    .ws-status.disconnected {
      background: #ffebee;
      color: #c62828;
    }

    .ws-status.connecting {
      background: #fff3e0;
      color: #e65100;
    }

    .ws-status.reconnecting {
      background: #e3f2fd;
      color: #1565c0;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.7;
      }
    }

    .quick-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 20px;
    }

    .btn {
      width: 100%;
      padding: 14px 20px;
      border: none;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s ease;
    }

    .btn:hover::before {
      left: 100%;
    }

    .btn-primary {
      background: linear-gradient(135deg, #007aff 0%, #0056d6 100%);
      color: #fff;
      box-shadow: 0 4px 16px rgba(0,122,255,0.35);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(0,122,255,0.45);
    }

    .btn-primary:active {
      transform: translateY(0) scale(0.98);
    }

    .btn-secondary {
      background: linear-gradient(135deg, #fff 0%, #f8f9fa 100%);
      color: #1d1d1f;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      border: 1px solid rgba(0,0,0,0.06);
    }

    .btn-secondary:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    }

    .btn-icon {
      font-size: 18px;
    }

    .tips-card {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      border: 1px solid #e8e8ed;
    }

    .tips-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 700;
      color: #1d1d1f;
      margin-bottom: 12px;
    }

    .tips-icon {
      font-size: 16px;
    }

    .tips-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .tips-list li {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 12px;
      color: #6b6b6b;
      line-height: 1.6;
      margin-bottom: 8px;
    }

    .tips-list li:last-child {
      margin-bottom: 0;
    }

    .tips-number {
      flex-shrink: 0;
      width: 18px;
      height: 18px;
      background: linear-gradient(135deg, #007aff 0%, #0056d6 100%);
      color: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
    }

    .status-card {
      background: #e8f5e9;
      border: 1px solid #c8e6c9;
      border-radius: 12px;
      padding: 12px 16px;
      text-align: center;
      font-size: 12px;
      color: #2e7d32;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: #34c759;
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.5;
      }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.1); }
    }

    .footer {
      padding: 16px 20px;
      text-align: center;
    }

    .footer-text {
      font-size: 11px;
      color: #86868b;
      font-weight: 500;
    }

    .footer-link {
      color: #007aff;
      text-decoration: none;
      font-weight: 600;
    }

    .footer-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo-section">
        <div class="logo-icon">🤖</div>
        <h1>Free AI</h1>
        <p class="tagline">免费多模型AI对话助手</p>
      </div>
      <div class="platform-badges">
        <span class="platform-badge badge-deepseek">DeepSeek</span>
        <span class="platform-badge badge-doubao">豆包</span>
        <span class="platform-badge badge-qianwen">千问</span>
        <span class="platform-badge badge-kimi">Kimi</span>
      </div>
    </div>

    <div class="content">
      <div class="settings-section">
        <div class="settings-header" id="settingsHeader">
          <div class="settings-title">
            <span>⚙️</span>
            <span>连接设置</span>
          </div>
          <span class="settings-toggle" id="settingsToggle">▼</span>
        </div>
        <div class="settings-content" id="settingsContent">
          <div class="setting-item">
            <label class="setting-label">WebSocket 服务器地址</label>
            <input type="text" class="setting-input" id="wsUrlInput" placeholder="ws://localhost:8080" />
          </div>
          <div class="setting-item">
            <div class="setting-checkbox-wrapper">
              <input type="checkbox" class="setting-checkbox" id="wsEnabledCheckbox" />
              <label class="setting-label" for="wsEnabledCheckbox">启用 WebSocket 连接</label>
            </div>
          </div>
          <div class="ws-status disconnected" id="wsStatus">
            <span class="status-dot"></span>
            <span id="wsStatusText">未连接</span>
          </div>
          <div style="display: flex; gap: 8px;">
            <button class="save-btn" id="saveSettingsBtn" style="flex: 1;">保存设置</button>
            <button class="save-btn" id="reconnectBtn" style="flex: 1; display: none;">立即重连</button>
          </div>
        </div>
      </div>

      <div class="quick-actions">
        <button class="btn btn-primary" id="openSidePanelBtn">
          <span class="btn-icon">📱</span>
          <span>打开侧边栏</span>
        </button>
        <button class="btn btn-secondary" id="newChatBtn">
          <span class="btn-icon">💬</span>
          <span>快速新建对话</span>
        </button>
      </div>

      <div class="tips-card">
        <div class="tips-title">
          <span class="tips-icon">⚡</span>
          <span>快速开始</span>
        </div>
        <ul class="tips-list">
          <li>
            <span class="tips-number">1</span>
            <span>先登录AI网站（如DeepSeek）</span>
          </li>
          <li>
            <span class="tips-number">2</span>
            <span>在侧边栏创建角色并测试</span>
          </li>
          <li>
            <span class="tips-number">3</span>
            <span>创建会话并选择角色</span>
          </li>
          <li>
            <span class="tips-number">4</span>
            <span>开始对话，享受多模型AI体验</span>
          </li>
        </ul>
      </div>

      <div class="status-card" id="status">
        <span class="status-dot"></span>
      </div>
    </div>

    <div class="footer">
      <p class="footer-text">
        Made with ❤️ · <a href="https://github.com/elonsolar/free-ai" class="footer-link" target="_blank">GitHub</a>
      </p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
